<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpockPM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        .stoic-face {
            width: 300px;
            height: 300px;
            margin-bottom: 2rem;
        }
        .chat-box {
            width: 80%;
            max-width: 500px;
            height: 400px;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 1rem;
            background-color: #1e1e1e;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .chat-message {
            max-width: 80%;
            padding: 0.5rem 1rem;
            border-radius: 15px;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #0066cc;
            align-self: flex-end;
        }
        .agent-message {
            background-color: #009900;
            align-self: flex-start;
        }
        .input-container {
            width: 80%;
            max-width: 500px;
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        #user-input {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 5px;
            background-color: #2a2a2a;
            color: #ffffff;
        }
        #send-button {
            padding: 0.5rem 1rem;
            background-color: #0066cc;
            border: none;
            border-radius: 5px;
            color: #ffffff;
            cursor: pointer;
        }
        #send-button:hover {
            background-color: #0052a3;
        }
        #mute-toggle {
            padding: 0.5rem 1rem;
            background-color: #666;
            border: none;
            border-radius: 5px;
            color: #ffffff;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        #mute-toggle.active {
            background-color: #cc0000;
        }
    </style>
</head>
<body>
    <h1>SpockPM</h1>
    <svg class="stoic-face" viewBox="0 0 400 400" width="300" height="300" xmlns="http://www.w3.org/2000/svg" aria-label="Abstract stoic face logo" role="img">
        <rect x="92" y="90" width="216" height="16" fill="#ffffff" />
        <rect x="194" y="128" width="14" height="118" fill="#ffffff" />
        <rect class="mouth" x="154" y="298" width="92" height="16" fill="#ffffff" />
    </svg>
    <div class="chat-box" id="chat-box">
        <!-- Chat messages will be inserted here -->
    </div>
    <div class="input-container">
        <input type="text" id="user-input" placeholder="Type a message to Spock...">
        <button id="send-button">Send</button>
        <button id="mute-toggle">Mute Voice</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const muteToggle = document.getElementById('mute-toggle');
        
        let isMuted = false;
        
        // Add a message to the chat
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isUser ? 'user-message' : 'agent-message'}`;
            messageDiv.textContent = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        // Send message to backend
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // Add user message to chat
            addMessage(message, true);
            userInput.value = '';
                        try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message, muted: isMuted })
                });
                
                const data = await response.json();
                
                if (data.type === 'text') {
                    addMessage(data.content, false);
                    // If not muted, we would use Eleven Labs here, but since we're getting text,
                    // we'll just display it. In a full implementation, we'd convert to speech.
                } else if (data.type === 'audio') {
                    // For audio response, we'd play the audio and show the text
                    addMessage(data.text, false);
                    if (!isMuted) {
                        // Play audio (base64 decoded)
                        const audioData = atob(data.audio);
                        const audioBlob = new Blob([audioData], { type: 'audio/mpeg' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        const audio = new Audio(audioUrl);
                        audio.play();
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('Sorry, I encountered an error. Please try again.', false);
            }
        }
        
        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        muteToggle.addEventListener('click', () => {
            isMuted = !isMuted;
            muteToggle.textContent = isMuted ? 'Unmute Voice' : 'Mute Voice';
            muteToggle.classList.toggle('active', isMuted);
        });
        
        // Initial message
        addMessage('Hello! I am Spock, your AI agent. How can I assist you today?', false);
    </script>
</body>
</html>
